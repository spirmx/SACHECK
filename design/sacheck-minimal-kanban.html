<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SACHECK Minimal Kanban</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "Roboto", "Arial", "sans-serif"],
          },
        },
      },
    };
  </script>
</head>
<body class="min-h-screen bg-gray-50 font-sans text-gray-900">
  <div class="flex min-h-screen">
    <aside class="hidden w-20 shrink-0 border-r border-gray-200 bg-white md:flex md:flex-col md:items-center md:py-6">
      <div class="mb-10 flex h-11 w-11 items-center justify-center rounded-xl bg-gray-900 text-lg font-bold text-white">S</div>

      <nav class="flex flex-1 flex-col items-center gap-3">
        <button class="flex h-11 w-11 items-center justify-center rounded-xl bg-gray-100 text-gray-900" aria-label="Board">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
            <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
            <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
            <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
          </svg>
        </button>
        <button class="flex h-11 w-11 items-center justify-center rounded-xl text-gray-400 transition hover:bg-gray-100 hover:text-gray-700" aria-label="Files">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 7.5A2.5 2.5 0 0 1 5.5 5H10l2 2h6.5A2.5 2.5 0 0 1 21 9.5v7A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"></path>
          </svg>
        </button>
        <button class="flex h-11 w-11 items-center justify-center rounded-xl text-gray-400 transition hover:bg-gray-100 hover:text-gray-700" aria-label="Team">
          <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M16 11a4 4 0 1 0-8 0"></path>
            <path d="M4 20a8 8 0 0 1 16 0"></path>
          </svg>
        </button>
      </nav>

      <button class="flex h-11 w-11 items-center justify-center rounded-xl text-gray-400 transition hover:bg-gray-100 hover:text-gray-700" aria-label="Settings">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"></path>
          <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 1.55V21a2 2 0 0 1-4 0v-.08A1.7 1.7 0 0 0 9 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-1.55-1H3a2 2 0 0 1 0-4h.08A1.7 1.7 0 0 0 4.6 9a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.55V3a2 2 0 0 1 4 0v.08A1.7 1.7 0 0 0 15 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9c.22.61.8 1 1.55 1H21a2 2 0 0 1 0 4h-.08A1.7 1.7 0 0 0 19.4 15z"></path>
        </svg>
      </button>
    </aside>

    <main class="flex-1 overflow-x-hidden">
      <header class="sticky top-0 z-20 border-b border-gray-200 bg-white/90 backdrop-blur">
        <div class="flex flex-col gap-4 px-5 py-4 sm:px-8 lg:flex-row lg:items-center lg:justify-between">
          <div class="relative w-full max-w-xl">
            <svg class="pointer-events-none absolute left-4 top-1/2 h-4 w-4 -translate-y-1/2 text-gray-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-3.5-3.5"></path>
            </svg>
            <input class="h-11 w-full rounded-xl border border-gray-200 bg-gray-50 pl-11 pr-4 text-sm outline-none transition placeholder:text-gray-400 focus:border-gray-300 focus:bg-white focus:ring-4 focus:ring-gray-100" placeholder="Search tasks, files, links..." />
          </div>

          <div class="flex items-center gap-3">
            <button class="inline-flex h-11 items-center gap-2 rounded-xl bg-gray-900 px-4 text-sm font-semibold text-white shadow-sm transition hover:bg-gray-800">
              + Quick Add
              <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="m6 9 6 6 6-6"></path>
              </svg>
            </button>
            <img class="h-10 w-10 rounded-full border border-gray-200 object-cover" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=80&q=80" alt="User avatar" />
          </div>
        </div>
      </header>

      <section class="px-5 py-6 sm:px-8">
        <div class="mb-6 flex flex-col gap-5 lg:flex-row lg:items-center lg:justify-between">
          <div>
            <p class="mb-2 text-sm font-medium text-gray-500">SACHECK / Work Board</p>
            <h1 class="text-3xl font-semibold tracking-tight text-gray-950">Project Overview</h1>
          </div>

          <div class="flex items-center gap-5 rounded-2xl border border-gray-200 bg-white px-5 py-4 shadow-sm">
            <div class="relative grid h-16 w-16 place-items-center rounded-full bg-conic-gradient">
              <div class="absolute inset-0 rounded-full" style="background: conic-gradient(#22c55e 0 66%, #e5e7eb 66% 100%);"></div>
              <div class="relative grid h-12 w-12 place-items-center rounded-full bg-white text-sm font-semibold text-gray-900">66%</div>
            </div>
            <div>
              <p class="text-sm font-medium text-gray-500">Completion</p>
              <p class="text-2xl font-semibold text-gray-950">6 of 9 done</p>
            </div>
          </div>
        </div>

        <div class="mb-6 grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
          <article class="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
              <p class="text-sm font-medium text-gray-500">Total</p>
              <span class="grid h-9 w-9 place-items-center rounded-lg bg-gray-100 text-gray-500">□</span>
            </div>
            <p class="text-3xl font-semibold text-gray-950">30</p>
          </article>
          <article class="rounded-xl border border-blue-100 bg-white p-5 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
              <p class="text-sm font-medium text-gray-500">Waiting</p>
              <span class="grid h-9 w-9 place-items-center rounded-lg bg-blue-50 text-blue-500">○</span>
            </div>
            <p class="text-3xl font-semibold text-gray-950">0</p>
          </article>
          <article class="rounded-xl border border-amber-100 bg-white p-5 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
              <p class="text-sm font-medium text-gray-500">Doing</p>
              <span class="grid h-9 w-9 place-items-center rounded-lg bg-amber-50 text-amber-600">↗</span>
            </div>
            <p class="text-3xl font-semibold text-gray-950">3</p>
          </article>
          <article class="rounded-xl border border-green-100 bg-white p-5 shadow-sm">
            <div class="mb-4 flex items-center justify-between">
              <p class="text-sm font-medium text-gray-500">Completed</p>
              <span class="grid h-9 w-9 place-items-center rounded-lg bg-green-50 text-green-600">✓</span>
            </div>
            <p class="text-3xl font-semibold text-gray-950">6</p>
          </article>
        </div>

        <div class="grid gap-5 xl:grid-cols-3">
          <section class="min-h-[420px] rounded-2xl bg-blue-50/70 p-4">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-base font-semibold text-gray-900">Waiting List <span class="ml-2 rounded-full bg-white px-2 py-0.5 text-xs font-medium text-gray-500">0</span></h2>
              <button class="text-gray-400 hover:text-gray-700">⋮</button>
            </div>
            <div class="grid min-h-[320px] place-items-center rounded-xl border border-dashed border-blue-100">
              <p class="text-sm font-medium text-gray-400">No tasks yet</p>
            </div>
          </section>

          <section class="min-h-[420px] rounded-2xl bg-amber-50/80 p-4">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-base font-semibold text-gray-900">Active (Doing) <span class="ml-2 rounded-full bg-white px-2 py-0.5 text-xs font-medium text-gray-500">3</span></h2>
              <button class="text-gray-400 hover:text-gray-700">⋮</button>
            </div>
            <div class="space-y-3">
              <task-card icon="G" color="green" title="Google Sheet: Q3 Project Report" avatar="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=80&q=80"></task-card>
              <task-card icon="W" color="blue" title="Client Feedback Portal V2" avatar="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?auto=format&fit=crop&w=80&q=80"></task-card>
              <task-card icon="M" color="yellow" title="Team Brainstorm Board" avatar="https://images.unsplash.com/photo-1519345182560-3f2917c472ef?auto=format&fit=crop&w=80&q=80"></task-card>
            </div>
          </section>

          <section class="min-h-[420px] rounded-2xl bg-green-50/80 p-4">
            <div class="mb-4 flex items-center justify-between">
              <h2 class="text-base font-semibold text-gray-900">Complete <span class="ml-2 rounded-full bg-white px-2 py-0.5 text-xs font-medium text-gray-500">6</span></h2>
              <button class="text-gray-400 hover:text-gray-700">⋮</button>
            </div>
            <div class="space-y-3">
              <task-card icon="W" color="blue" title="Word Doc: Q1 Process Doc" avatar="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=80&q=80"></task-card>
              <task-card icon="M" color="yellow" title="Miro: Brainstorm Board" avatar="https://images.unsplash.com/photo-1508214751196-bcfd4ca60f91?auto=format&fit=crop&w=80&q=80"></task-card>
              <task-card icon="🌐" color="sky" title="Web: User Feedback Portal" avatar="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=80&q=80"></task-card>
              <task-card icon="G" color="green" title="Internal spreadsheet doc" avatar="https://images.unsplash.com/photo-1519345182560-3f2917c472ef?auto=format&fit=crop&w=80&q=80"></task-card>
            </div>
          </section>
        </div>
      </section>
    </main>
  </div>

  <script>
    customElements.define("task-card", class extends HTMLElement {
      connectedCallback() {
        const icon = this.getAttribute("icon") || "•";
        const title = this.getAttribute("title") || "Untitled task";
        const avatar = this.getAttribute("avatar") || "";
        const colors = {
          blue: "bg-blue-100 text-blue-700",
          green: "bg-green-100 text-green-700",
          yellow: "bg-yellow-100 text-yellow-700",
          sky: "bg-sky-100 text-sky-700",
        };
        const color = colors[this.getAttribute("color")] || "bg-gray-100 text-gray-700";
        this.innerHTML = `
          <article class="group rounded-xl border border-gray-200 bg-white p-3 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md">
            <div class="flex items-start gap-3">
              <div class="grid h-9 w-9 shrink-0 place-items-center rounded-lg ${color} text-sm font-bold">${icon}</div>
              <div class="min-w-0 flex-1">
                <h3 class="truncate text-sm font-semibold text-gray-950">${title}</h3>
              </div>
              <button class="rounded-lg px-2 text-xl leading-6 text-gray-300 transition hover:bg-gray-100 hover:text-gray-700" aria-label="Task menu">⋮</button>
            </div>
            <div class="mt-4 flex justify-end">
              <img class="h-7 w-7 rounded-full border border-gray-200 object-cover" src="${avatar}" alt="Assignee" />
            </div>
          </article>
        `;
      }
    });
  </script>
</body>
</html>
